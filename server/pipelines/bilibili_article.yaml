name: "B站专栏"
description: "生成B站专栏深度图文"
platforms: ["bilibili"]

stages:
  - agent: topic_generator
    config:
      style: "深度分析"
      count: 5

  - agent: material_collector
    config:
      sources: ["web"]
      max_items: 15

  - agent: content_generator
    config:
      platform: bilibili
      format: article

  - agent: reviewer
    config:
      rules: ["platform_compliance", "quality_score"]
      min_score: 7.5

  - agent: analyst
    config:
      metrics: ["engagement", "reach"]
