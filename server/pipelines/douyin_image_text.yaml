name: "抖音图文"
description: "生成抖音种草图文/短视频脚本 — 支持源文档输入和多源图片策略"
platforms: ["douyin"]

stages:
  - agent: topic_generator
    config:
      style: "种草"
      count: 5

  - agent: document_synthesizer
    config:
      temperature: 0.3

  - agent: image_extractor
    config:
      max_images: 20

  - agent: material_collector
    config:
      sources: ["web"]
      max_items: 8

  - agent: content_generator
    config:
      platform: douyin
      format: image_text

  - agent: post_processor
    config:
      output_dir: outputs
      on_error: skip

  - agent: reviewer
    config:
      rules: ["platform_compliance", "quality_score"]
      min_score: 7.0

  - agent: analyst
    config:
      metrics: ["engagement", "reach"]
