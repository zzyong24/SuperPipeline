name: "抖音图文"
description: "生成抖音种草图文/短视频脚本"
platforms: ["douyin"]

stages:
  - agent: topic_generator
    config:
      style: "种草"
      count: 5

  - agent: material_collector
    config:
      sources: ["web"]
      max_items: 8

  - agent: content_generator
    config:
      platform: douyin
      format: image_text

  - agent: reviewer
    config:
      rules: ["platform_compliance", "quality_score"]
      min_score: 7.0

  - agent: analyst
    config:
      metrics: ["engagement", "reach"]
