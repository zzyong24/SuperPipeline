name: "公众号长文"
description: "生成微信公众号深度长文"
platforms: ["wechat"]

stages:
  - agent: topic_generator
    config:
      style: "深度洞察"
      count: 3

  - agent: material_collector
    config:
      sources: ["web"]
      max_items: 20

  - agent: content_generator
    config:
      platform: wechat
      format: long_article

  - agent: reviewer
    config:
      rules: ["platform_compliance", "quality_score"]
      min_score: 8.0

  - agent: analyst
    config:
      metrics: ["engagement", "reach"]
