name: "X 推文"
description: "生成 X (Twitter) 短推文"
platforms: ["x"]

stages:
  - agent: topic_generator
    config:
      style: "观点输出"
      count: 5

  - agent: material_collector
    config:
      sources: ["web"]
      max_items: 5

  - agent: content_generator
    config:
      platform: x
      format: tweet

  - agent: reviewer
    config:
      rules: ["platform_compliance", "quality_score"]
      min_score: 7.0

  - agent: analyst
    config:
      metrics: ["engagement", "reach"]
